name: Trend research auto

on:
  workflow_dispatch:
    inputs:
      input_zip:
        description: "Input ZIP path. Blank = latest under input/"
        required: false
        default: ""
      mode:
        description: "Run mode"
        required: true
        default: "current_future_svg_replace"
        type: choice
        options:
          - current_future_svg_replace
          - past_future_real_image_replace
          - validate_only
  push:
    paths:
      - "input/**/*.zip"
      - ".github/workflows/trend-research-auto.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Select input
        id: input
        shell: bash
        run: |
          set -euo pipefail
          MODE="current_future_svg_replace"
          INPUT_ZIP=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            INPUT_ZIP="${{ inputs.input_zip }}"
          fi
          if [ -z "$INPUT_ZIP" ]; then
            INPUT_ZIP="$(find input -type f -name '*.zip' | sort | tail -n 1 || true)"
          fi
          if [ -z "$INPUT_ZIP" ]; then
            echo "No input zip. Skip."
            echo "has_input=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test -f "$INPUT_ZIP"
          echo "has_input=true" >> "$GITHUB_OUTPUT"
          echo "input_zip=$INPUT_ZIP" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.input.outputs.has_input == 'true'
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        if: steps.input.outputs.has_input == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build
        if: steps.input.outputs.has_input == 'true'
        run: |
          RUN_DATE="$(date +%Y%m%d)"
          echo "RUN_DATE=$RUN_DATE" >> "$GITHUB_ENV"
          python scripts/run_trend_pipeline.py \
            --input-zip "${{ steps.input.outputs.input_zip }}" \
            --mode "${{ steps.input.outputs.mode }}" \
            --date "$RUN_DATE" \
            --output-dir output

      - name: Prepare latest
        if: steps.input.outputs.has_input == 'true'
        run: |
          rm -rf latest
          mkdir -p latest
          [ -d output/_work/root/03_report ] && cp -R output/_work/root/03_report latest/03_report || true
          [ -d output/_work/root/02_data ] && cp -R output/_work/root/02_data latest/02_data || true
          [ -d output/_work/root/04_manifest ] && cp -R output/_work/root/04_manifest latest/04_manifest || true
          RESULT_ZIP="$(find output -maxdepth 1 -type f -name '*.zip' | sort | tail -n 1)"
          RESULT_SHA="$(sha256sum "$RESULT_ZIP" | awk '{print $1}')"
          cat > latest/RUN_INFO.md <<EOF
          # Trend research latest run
          - Run: ${{ github.run_number }}
          - Date: ${RUN_DATE}
          - Mode: ${{ steps.input.outputs.mode }}
          - Input: ${{ steps.input.outputs.input_zip }}
          - Result: $(basename "$RESULT_ZIP")
          - SHA256: ${RESULT_SHA}
          EOF

      - name: Upload artifact
        if: steps.input.outputs.has_input == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trend-research-result-${{ github.run_number }}
          path: output/**/*
          retention-days: 14

      - name: Commit latest summary
        if: steps.input.outputs.has_input == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest
          git commit -m "chore: publish latest trend summary [skip ci]" || exit 0
          git push
