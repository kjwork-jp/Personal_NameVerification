              "        return self._names[index]\n\n"
              "    def _unlink_target_summary_text(self) -> str:\n"
              "        row = self._selected_unlink_row()\n"
              "        name = self._selected_unregister_name()\n"
              "        if row is None:\n"
              "            return \"解除対象: 未選択\"\n"
              "        name_text = getattr(name, \"raw_name\", \"不明\") if name is not None else \"不明\"\n"
