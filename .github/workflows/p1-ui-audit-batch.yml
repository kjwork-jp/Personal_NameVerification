              'status_filter = self.log_status_filter.currentText()': 'status_filter = {"すべて": "all", "成功": "success", "失敗": "error", "キャンセル": "cancel"}.get(self.log_status_filter.currentText(), self.log_status_filter.currentText())',
              'action_filter = self.log_action_filter.currentText()': 'action_filter = "all" if self.log_action_filter.currentText() == "すべて" else self.log_action_filter.currentText()',
              'if source_text == "all (current + archives)":': 'if source_text == "すべて（現在＋過去ログ）":',
              'elif source_text.startswith("archive:"):\n            include_archives = False\n            archive_path = Path(source_text.removeprefix("archive:").strip())': 'elif source_text.startswith("過去ログ:"):\n            include_archives = False\n            archive_path = Path(source_text.removeprefix("過去ログ:").strip())',
          }
