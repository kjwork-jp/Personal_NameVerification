              "            [\n"
              "                \"解除対象（この1件のみ）\",\n"
              "                f\"名前: {name_text}\",\n"
              "                f\"タイトル: {row.title_name}\",\n"
              "                f\"サブタイトル: {row.subtitle_code} / {row.subtitle_name}\",\n"
              "                f\"関連種別: {row.relation_type}\",\n"
              "                f\"リンク公開ID: {public_id_detail(getattr(row, 'link_public_id', None))}\",\n"
              "                f\"内部リンクID: {row.link_id}\",\n"
              "            ]\n"
