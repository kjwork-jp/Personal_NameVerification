              'setPlaceholderText("message 検索（部分一致）")': 'setPlaceholderText("メッセージ検索（部分一致）")',
              '"Export"': '"データ出力"',
              '"Backup"': '"バックアップ"',
              '"Restore（destructive）"': '"復元（破壊的操作）"',
