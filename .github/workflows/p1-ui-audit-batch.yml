              "from app.ui.datetime_display import format_datetime_display\n"
              "from app.ui.navigation_guide import OperationGuide, SectionPanel\n",
          )
          replace_once(
              "app/ui/user_management_tab.py",
              '            user.last_login_at or "",\n',
              '            format_datetime_display(user.last_login_at, fallback="未ログイン"),\n',
          )

          # 2. Title edit layout and linked-name filter.
          replace_once(
              "app/ui/title_management_tab.py",
              "from PySide6.QtWidgets import QGroupBox, QLabel, QVBoxLayout, QWidget\n",
              "from PySide6.QtWidgets import QGroupBox, QLabel, QLineEdit, QVBoxLayout, QWidget\n",
          )
          replace_once(
              "app/ui/title_management_tab.py",
              "        self.title_list_summary_label = self._build_title_list_summary_label()\n",
              "        self.title_list_summary_label = self._build_title_list_summary_label()\n"
              "        self.title_name_filter_input = QLineEdit()\n"
              "        self.title_name_filter_input.setPlaceholderText(\n"
              "            \"関連する名前でタイトルを絞り込み\"\n"
              "        )\n"
              "        self.title_name_filter_input.setClearButtonEnabled(True)\n"
              "        self.title_name_filter_input.textChanged.connect(\n"
              "            lambda _text: self._apply_title_name_filter()\n"
