          replace_once(
              "app/ui/link_management_tab.py",
              "    def _create_link(self) -> None:\n",
              "    def _selected_unlink_row(self) -> Any | None:\n"
              "        index = self.unregister_link_combo.currentIndex()\n"
              "        if index < 0 or index >= len(self._links):\n"
