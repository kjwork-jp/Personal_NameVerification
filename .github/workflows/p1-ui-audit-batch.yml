              '"destructive 操作です。実行前にバックアップ取得を確認してください。"': '"破壊的操作です。実行前にバックアップ取得を確認してください。"',
              'current = self.log_source_selector.currentText() or "current only"': 'current = self.log_source_selector.currentText() or "現在のログのみ"',
