          replace_all("app/ui/operations_tab.py", "CSV Import確認", "CSV取込の確認")
          replace_all("app/ui/operations_tab.py", "JSON Import確認", "JSON取込の確認")
          replace_all("app/ui/operations_tab.py", "CSV import", "CSV取込")
          replace_all("app/ui/operations_tab.py", "JSON import", "JSON取込")
          replace_all("app/ui/operations_tab.py", "import source", "取込元")
