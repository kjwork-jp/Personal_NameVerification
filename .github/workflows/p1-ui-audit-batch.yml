              'text = f"source: all（current + archives {len(archives)}件）"': 'text = f"ログ対象: すべて（現在＋過去ログ {len(archives)}件）"',
              'text = f"source: archive（{name}）"': 'text = f"ログ対象: 過去ログ（{name}）"',
              '"archive はありません。"': '"過去ログはありません。"',
              'current = self.log_action_filter.currentText() or "all"': 'current = self.log_action_filter.currentText() or "すべて"',
              'self.log_action_filter.addItem("all")': 'self.log_action_filter.addItem("すべて")',
