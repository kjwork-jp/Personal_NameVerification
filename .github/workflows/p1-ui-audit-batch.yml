name: P1 UI audit batch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/p1-ui-audit-batch.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubicloud-standard-2
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Apply audited P1 fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c fix/p1-ui-audit-batch-20260615
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one match, found {count}: {old[:80]!r}")
              write(path, text.replace(old, new, 1))

          def replace_all(path: str, old: str, new: str, minimum: int = 1) -> None:
              text = read(path)
              count = text.count(old)
              if count < minimum:
                  raise RuntimeError(f"{path}: expected >= {minimum} matches, found {count}: {old[:80]!r}")
              write(path, text.replace(old, new))

          # 1. Datetime display helper: all remaining visible timestamp surfaces.
          replace_once(
              "app/ui/search_tab.py",
              "from app.application.read_models import NameDetail, NameSearchRow, RelatedRow\n",
              "from app.application.read_models import NameDetail, NameSearchRow, RelatedRow\n"
              "from app.ui.datetime_display import format_datetime_display\n",
          )
          replace_once(
              "app/ui/search_tab.py",
              'self.results_table.setItem(i, 8, QTableWidgetItem(detail.updated_at if detail else ""))',
              'self.results_table.setItem(\n'
              '                i,\n'
              '                8,\n'
              '                QTableWidgetItem(\n'
              '                    format_datetime_display(detail.updated_at, fallback="") if detail else ""\n'
              '                ),\n'
              '            )',
          )

          replace_once(
              "app/ui/title_subtitle_management_tab.py",
              "from app.ui.dialogs import confirm_destructive_action\n",
              "from app.ui.datetime_display import format_datetime_display\n"
              "from app.ui.dialogs import confirm_destructive_action\n",
          )
          replace_all(
              "app/ui/title_subtitle_management_tab.py",
              "QTableWidgetItem(row.updated_at)",
              'QTableWidgetItem(format_datetime_display(row.updated_at, fallback=""))',
              minimum=2,
          )

          replace_once(
              "app/ui/subtitle_management_tab.py",
              "from app.ui.navigation_polish import apply_workflow_tab_navigation\n",
              "from app.ui.datetime_display import format_datetime_display\n"
              "from app.ui.navigation_polish import apply_workflow_tab_navigation\n",
          )
          replace_once(
              "app/ui/subtitle_management_tab.py",
              "                        subtitle.updated_at,\n",
              '                        format_datetime_display(subtitle.updated_at, fallback=""),\n',
          )

          replace_once(
              "app/ui/help_settings_tab.py",
              "from app.ui.input_defaults import default_operator_id\n",
              "from app.ui.datetime_display import format_datetime_display\n"
              "from app.ui.input_defaults import default_operator_id\n",
          )
          replace_once(
              "app/ui/help_settings_tab.py",
              '        updated = datetime.fromtimestamp(stat.st_mtime).strftime("%Y-%m-%d %H:%M:%S")\n',
              "        updated = format_datetime_display(\n"
              "            datetime.fromtimestamp(stat.st_mtime), fallback=\"不明\"\n"
              "        )\n",
          )

          replace_once(
              "app/ui/user_management_tab.py",
