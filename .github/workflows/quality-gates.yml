name: Quality Gates

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  quality-gates:
    name: pytest / ruff / black / mypy
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish pending status
        shell: pwsh
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} `
            -f state=pending `
            -f context="chatgpt/quality-gates" `
            -f description="Quality Gates are running" `
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        shell: pwsh
        run: pytest -q --basetemp tmp/pytest-actions-${{ github.run_id }}

      - name: Run ruff
        shell: pwsh
        run: ruff check .

      - name: Run black check
        shell: pwsh
        run: black --check .

      - name: Run mypy
        shell: pwsh
        run: mypy app

      - name: Publish success status
        if: success()
        shell: pwsh
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} `
            -f state=success `
            -f context="chatgpt/quality-gates" `
            -f description="pytest, ruff, black, and mypy passed" `
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish failure status
        if: failure()
        shell: pwsh
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} `
            -f state=failure `
            -f context="chatgpt/quality-gates" `
            -f description="Quality Gates failed; inspect the Actions run" `
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
