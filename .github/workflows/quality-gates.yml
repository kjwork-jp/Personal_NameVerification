name: Quality Gates

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  quality-gates:
    name: ruff / black / mypy / pytest
    runs-on: ubicloud-standard-2
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "pending",
              context: "chatgpt/quality-gates",
              description: "Quality Gates are running",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        id: ruff
        continue-on-error: true
        run: |
          set +e
          ruff check . > ruff-output.txt 2>&1
          ruff_exit_code=$?
          cat ruff-output.txt
          if [ "$ruff_exit_code" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload ruff failure output
        if: steps.ruff.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt

      - name: Fail after ruff
        if: steps.ruff.outputs.failed == 'true'
        run: exit 1

      - name: Run black check
        run: black --check .

      - name: Run mypy
        run: mypy app

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          set +e
          mkdir -p tmp
          pytest -q --basetemp "tmp/pytest-actions-${{ github.run_id }}" > pytest-output.txt 2>&1
          pytest_exit_code=$?
          cat pytest-output.txt
          if [ "$pytest_exit_code" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload pytest failure output
        if: steps.pytest.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Fail after pytest
        if: steps.pytest.outputs.failed == 'true'
        run: exit 1

      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: "chatgpt/quality-gates",
              description: "ruff, black, mypy, and pytest passed",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "failure",
              context: "chatgpt/quality-gates",
              description: "Quality Gates failed; inspect the Actions run",
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
