name: Quality Gates

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  quality-gates:
    name: ruff / black / mypy / pytest
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish pending status
        shell: pwsh
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} `
            -f state=pending `
            -f context="chatgpt/quality-gates" `
            -f description="Quality Gates are running" `
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        id: ruff
        shell: pwsh
        continue-on-error: true
        run: |
          ruff check . *> ruff-output.txt
          $ruffExitCode = $LASTEXITCODE
          Get-Content ruff-output.txt
          if ($ruffExitCode -ne 0) {
            "failed=true" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Upload ruff failure output
        if: steps.ruff.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt

      - name: Fail after ruff
        if: steps.ruff.outputs.failed == 'true'
        shell: pwsh
        run: exit 1

      - name: Run black check
        shell: pwsh
        run: black --check .

      - name: Run mypy
        shell: pwsh
        run: mypy app

      - name: Run pytest
        id: pytest
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path tmp | Out-Null
          pytest -q --basetemp tmp/pytest-actions-${{ github.run_id }} *> pytest-output.txt
          $pytestExitCode = $LASTEXITCODE
          Get-Content pytest-output.txt
          if ($pytestExitCode -ne 0) {
            "failed=true" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Upload pytest failure output
        if: steps.pytest.outputs.failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Fail after pytest
        if: steps.pytest.outputs.failed == 'true'
        shell: pwsh
        run: exit 1

      - name: Publish success status
        if: success()
        shell: pwsh
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} `
            -f state=success `
            -f context="chatgpt/quality-gates" `
            -f description="ruff, black, mypy, and pytest passed" `
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish failure status
        if: failure()
        shell: pwsh
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} `
            -f state=failure `
            -f context="chatgpt/quality-gates" `
            -f description="Quality Gates failed; inspect the Actions run" `
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
