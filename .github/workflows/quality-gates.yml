name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gates:
    name: pytest / ruff / black / mypy
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        shell: pwsh
        run: pytest -q

      - name: Run ruff
        shell: pwsh
        run: ruff check .

      - name: Run black check
        shell: pwsh
        run: black --check .

      - name: Run mypy
        shell: pwsh
        run: mypy app
