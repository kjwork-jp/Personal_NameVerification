name: Windows EXE Build

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Temporary local release name used for package/smoke validation"
        required: true
        default: "v0.3.0-smoke-dryrun"
      startup_seconds:
        description: "Seconds to wait after launching the portable EXE"
        required: true
        default: "5"

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build package and portable smoke
        shell: pwsh
        run: |
          .\scripts\run_release_windows.ps1 `
            -ReleaseName "${{ inputs.release_name }}" `
            -StartupSeconds ([int]"${{ inputs.startup_seconds }}")

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NameVerification-windows-exe
          path: dist/NameVerification.exe
          if-no-files-found: error

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NameVerification-windows-release
          path: |
            release/NameVerification-${{ inputs.release_name }}-portable.zip
            release/${{ inputs.release_name }}/00_manifest_${{ inputs.release_name }}_*.csv
            release/${{ inputs.release_name }}/70_release_evidence/checksums_sha256_${{ inputs.release_name }}_*.txt
            release/${{ inputs.release_name }}/70_release_evidence/validation_log_template_${{ inputs.release_name }}_*.txt
            release/${{ inputs.release_name }}/70_release_evidence/release_verification_checklist_${{ inputs.release_name }}_*.md
          if-no-files-found: error
