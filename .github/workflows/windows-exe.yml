name: Windows EXE Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build EXE
        shell: pwsh
        run: .\scripts\build_exe_windows.ps1

      - name: Package release zip
        shell: pwsh
        run: .\scripts\package_release_windows.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NameVerification-windows-exe
          path: dist/NameVerification.exe
          if-no-files-found: error

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: NameVerification-windows-release-zip
          path: release/NameVerification-windows.zip
          if-no-files-found: error
