[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nameverification-v3"
version = "0.1.0"
description = "NameVerification v3 bootstrap package"
requires-python = ">=3.12"
dependencies = [
  "PySide6>=6.7,<7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "pytest-cov>=5,<6",
  "ruff>=0.6,<0.7",
  "black>=24.8,<25",
  "mypy>=1.11,<2",
]


[tool.setuptools.packages.find]
include = ["app", "app.*"]
exclude = ["tests", "docs", "prompts", "db", "assets", "scripts"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.mypy]
python_version = "3.12"
strict = true
files = ["app"]
exclude = ["tests"]
warn_unused_configs = true


[[tool.mypy.overrides]]
module = ["PySide6", "PySide6.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["app.ui.*"]
disable_error_code = ["misc", "no-any-return"]
